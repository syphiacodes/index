<!DOCTYPE html>
<html lang='en'>
<head>
<meta charset='UTF-8'>
<title>cass</title>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:#0b0b12;
font-family:Helvetica, sans-serif;
color:#d6ccff;
}

canvas{
display:block;
touch-action:none;
}

#desktopApp{display:block;}

#panel{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:rgba(10,10,18,0.92);
backdrop-filter:blur(10px);
color:#d6ccff;
padding:18px;
box-sizing:border-box;
display:none;
border-left:1px solid #2a2440;
z-index:10;
}

#panel h2{margin:0 0 10px 0;color:#b08cff;font-size:16px;}
#panel p{font-size:13px;line-height:1.4;opacity:0.9;}
#panel a{color:#c4b5fd;text-decoration:underline;}

</style>
</head>
<body>

<div id="desktopApp">
<canvas id="c"></canvas>
<div id="panel">
<h2 id="pTitle"></h2>
<p id="pBody"></p>
<a id="pLink" target="_blank">learn more</a>
</div>
</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

const panel = document.getElementById('panel');
const pTitle = document.getElementById('pTitle');
const pBody = document.getElementById('pBody');
const pLink = document.getElementById('pLink');

let W = 0, H = 0;

let cam = { x: 0, y: 0, s: 1 };
let nodes = [], edges = [];
let hoverNode = null;

const GROUPS = {
  music: { color: '#b08cff' },
  web: { color: '#c4b5fd' },
  about: { color: '#d6ccff' }
};

const NODES_CONFIG = [
  {id:'17',group:'about',text:'based in central europe.'},
  {id:'live audio',group:'about',text:'interested in live audio'},
  {id:'music production',group:'about',text:'music work'},
  {id:'event management',group:'about',text:'events'},
  {id:'discogs',group:'music',text:'collection',link:'https://www.discogs.com/user/casssch'},
  {id:'lastfm',group:'music',text:'music archive',link:'https://www.last.fm/user/casssch'},
  {id:'spotify',group:'music',text:'playlists',link:'https://open.spotify.com'},
  {id:'insta',group:'web',text:'photos',link:'https://instagram.com/cassfields'},
  {id:'github',group:'web',text:'code',link:'https://github.com'},
  {id:'email',group:'web',text:'contact',link:'mailto:cass@cass.li'}
];

function resize(){
  const dpr = window.devicePixelRatio || 1;

  W = window.innerWidth;
  H = window.innerHeight;

  c.style.width = W + "px";
  c.style.height = H + "px";

  c.width = Math.round(W * dpr);
  c.height = Math.round(H * dpr);

  ctx.setTransform(dpr,0,0,dpr,0,0);
}

function worldToScreen(x,y){
  return {
    x:(x + cam.x) * cam.s + W/2,
    y:(y + cam.y) * cam.s + H/2
  };
}

function screenToWorld(x,y){
  return {
    x:(x - W/2)/cam.s - cam.x,
    y:(y - H/2)/cam.s - cam.y
  };
}

function getMousePos(e){
  const rect = c.getBoundingClientRect();
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
}

function init(){
  nodes = [{
    id:'cass',
    x:0,y:0,fixed:true,
    group:'core',
    rHit:26,
    rVisual:6,
    text:'main site',
    link:'https://cass.li'
  }];

  edges = [];

  NODES_CONFIG.forEach((n,i)=>{
    nodes.push({
      ...n,
      x:(Math.random()-0.5)*500,
      y:(Math.random()-0.5)*500,
      vx:0,vy:0,
      rHit:18,
      rVisual:4
    });

    edges.push([0,i+1]);
  });
}

function getNodeAt(x,y){
  const w = screenToWorld(x,y);

  let closest = null;
  let closestDist = Infinity;

  for(const n of nodes){
    const dx = w.x - n.x;
    const dy = w.y - n.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    const hit = n.rHit || 18;

    if(dist < hit && dist < closestDist){
      closest = n;
      closestDist = dist;
    }
  }

  return closest;
}

function openPanel(n){
  panel.style.display = 'block';
  pTitle.textContent = n.id;
  pBody.textContent = n.text || '';

  if(n.link){
    pLink.style.display = 'inline-block';
    pLink.href = n.link;
  } else {
    pLink.style.display = 'none';
  }
}

let pointer = { down:false, node:null, startX:0, startY:0, dragging:false };
let camStart = { x:0, y:0 };

c.addEventListener('pointerdown', e=>{
  const m = getMousePos(e);

  pointer.down = true;
  pointer.node = getNodeAt(m.x,m.y);
  pointer.startX = m.x;
  pointer.startY = m.y;

  camStart.x = cam.x;
  camStart.y = cam.y;

  pointer.dragging = false;
});

c.addEventListener('pointermove', e=>{
  const m = getMousePos(e);

  hoverNode = getNodeAt(m.x,m.y);

  if(!pointer.down) return;

  const dx = m.x - pointer.startX;
  const dy = m.y - pointer.startY;

  if(Math.hypot(dx,dy) > 5) pointer.dragging = true;

  if(pointer.node && pointer.dragging){
    const w = screenToWorld(m.x,m.y);
    pointer.node.x = w.x;
    pointer.node.y = w.y;
  } else if(!pointer.node){
    cam.x = camStart.x + dx/cam.s;
    cam.y = camStart.y + dy/cam.s;
  }
});

c.addEventListener('pointerup', e=>{
  const m = getMousePos(e);

  const n = getNodeAt(m.x,m.y);

  if(pointer.node && !pointer.dragging && n === pointer.node){
    openPanel(n);
  }

  pointer.down = false;
  pointer.node = null;
  pointer.dragging = false;
});

c.addEventListener('wheel', e=>{
  e.preventDefault();
  const zoom = 0.0015;
  cam.s *= 1 - e.deltaY * zoom;
  cam.s = Math.max(0.4, Math.min(3, cam.s));
},{passive:false});


function step(){
  for(const n of nodes){
    if(n.fixed) continue;
    n.vx *= 0.985;
    n.vy *= 0.985;
    n.x += n.vx;
    n.y += n.vy;
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // edges
  ctx.strokeStyle = '#c4b5fd';
  edges.forEach(e=>{
    const a = worldToScreen(nodes[e[0]].x,nodes[e[0]].y);
    const b = worldToScreen(nodes[e[1]].x,nodes[e[1]].y);

    ctx.globalAlpha = hoverNode ? 0.15 : 0.25;
    ctx.beginPath();
    ctx.moveTo(a.x,a.y);
    ctx.lineTo(b.x,b.y);
    ctx.stroke();
  });

  ctx.globalAlpha = 1;

  // nodes
  for(const n of nodes){
    const p = worldToScreen(n.x,n.y);

    const isHover = hoverNode && hoverNode.id === n.id;
    ctx.globalAlpha = hoverNode && !isHover ? 0.3 : 1;

    ctx.fillStyle = GROUPS[n.group]?.color || '#fff';
    ctx.beginPath();
    ctx.arc(p.x,p.y,n.rVisual,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle = '#b08cff';
    ctx.font = '12px Arial';
    ctx.fillText(n.id,p.x+8,p.y+4);
  }

  ctx.globalAlpha = 1;
}

function loop(){
  step();
  draw();
  requestAnimationFrame(loop);
}

init();
resize();
window.addEventListener('resize',resize);
loop();

</script>
</body>
</html>
